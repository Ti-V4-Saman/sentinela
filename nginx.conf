server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA routing fallback for React / Vite
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for /v3/bot/self/ endpoints (hides token in path)
    location ~ ^/quepasa-proxy/v3/bot/self/(.*)$ {
        resolver 8.8.8.8 1.1.1.1 valid=300s;
        set $token $http_x_quepasa_token;
        proxy_pass https://apiwhatsapp.v4saman.com/v3/bot/$token/$1?$args;
        proxy_set_header Host apiwhatsapp.v4saman.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }

    # Reverse proxy for QuePasa API standard endpoints (hides token query param)
    location ~ ^/quepasa-proxy/(.*)$ {
        resolver 8.8.8.8 1.1.1.1 valid=300s;

        set $req_path $1;
        set $token_param "";
        if ($http_x_quepasa_token != "") {
            set $token_param "token=$http_x_quepasa_token";
        }

        proxy_pass https://apiwhatsapp.v4saman.com/$req_path?$args&$token_param;
        proxy_set_header Host apiwhatsapp.v4saman.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }
}
