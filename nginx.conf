server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SPA routing fallback for React / Vite
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy for QuePasa API (bypasses CORS and handles token headers in production)
    location /quepasa-proxy/ {
        # Handle header token rewrite for /v3/bot/self/ -> /v3/bot/{token}/
        if ($http_x_quepasa_token != "") {
            rewrite ^/quepasa-proxy/v3/bot/self/(.*)$ /v3/bot/$http_x_quepasa_token/$1 break;
        }

        # Rewrite standard /quepasa-proxy/... -> /...
        rewrite ^/quepasa-proxy/(.*)$ /$1 break;

        proxy_pass https://apiwhatsapp.v4saman.com;
        proxy_set_header Host apiwhatsapp.v4saman.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_ssl_server_name on;
    }
}
